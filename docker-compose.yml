x-backend-env: &backend-env
  PYTHONUNBUFFERED: "1"
  APP_ENV: ${APP_ENV:-development}
  DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@db:5432/tolmach}
  FRONTEND_ORIGINS: ${FRONTEND_ORIGINS:-http://localhost:5173}
  SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-tolmach_session}
  SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
  SESSION_COOKIE_SAMESITE: ${SESSION_COOKIE_SAMESITE:-lax}
  CSRF_COOKIE_NAME: ${CSRF_COOKIE_NAME:-tolmach_csrf}
  CSRF_HEADER_NAME: ${CSRF_HEADER_NAME:-X-CSRF-Token}
  LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
  LLM_MODEL: ${LLM_MODEL:-qwen3:4b}
  OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
  PRODUCTION_LLM_BASE_URL: ${PRODUCTION_LLM_BASE_URL:-}
  PRODUCTION_LLM_API_KEY: ${PRODUCTION_LLM_API_KEY:-}
  PRODUCTION_LLM_MODEL: ${PRODUCTION_LLM_MODEL:-}
  EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-disabled}
  EMBEDDING_MODEL: ${EMBEDDING_MODEL:-}
  EMBEDDING_TIMEOUT_SECONDS: ${EMBEDDING_TIMEOUT_SECONDS:-30}
  EMBEDDING_MAX_RETRIES: ${EMBEDDING_MAX_RETRIES:-2}
  LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.1}
  LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-30}
  LLM_MAX_RETRIES: ${LLM_MAX_RETRIES:-1}
  LLM_RETRY_BACKOFF_MS: ${LLM_RETRY_BACKOFF_MS:-250}
  QUERY_WORKFLOW_TIMEOUT_SECONDS: ${QUERY_WORKFLOW_TIMEOUT_SECONDS:-90}
  HEALTH_REPORT_LLM_TIMEOUT_SECONDS: ${HEALTH_REPORT_LLM_TIMEOUT_SECONDS:-1.5}
  LLM_STRICT_MODE: ${LLM_STRICT_MODE:-false}
  LLM_RULE_FALLBACK_ENABLED: ${LLM_RULE_FALLBACK_ENABLED:-true}
  LLM_PROMPT_CLASSIFIER_VERSION: ${LLM_PROMPT_CLASSIFIER_VERSION:-v1}
  LLM_PROMPT_INTENT_VERSION: ${LLM_PROMPT_INTENT_VERSION:-v1}
  LLM_PROMPT_CLARIFICATION_VERSION: ${LLM_PROMPT_CLARIFICATION_VERSION:-v1}
  LLM_PROMPT_PLAN_VERSION: ${LLM_PROMPT_PLAN_VERSION:-v1}
  LLM_PROMPT_SUMMARY_VERSION: ${LLM_PROMPT_SUMMARY_VERSION:-v1}
  RETRIEVAL_ENABLE_VECTORS: ${RETRIEVAL_ENABLE_VECTORS:-true}
  RETRIEVAL_TOP_K_TERMS: ${RETRIEVAL_TOP_K_TERMS:-8}
  RETRIEVAL_TOP_K_TEMPLATES: ${RETRIEVAL_TOP_K_TEMPLATES:-4}
  RETRIEVAL_TOP_K_EXAMPLES: ${RETRIEVAL_TOP_K_EXAMPLES:-4}
  RETRIEVAL_PLANNER_TOP_K: ${RETRIEVAL_PLANNER_TOP_K:-12}
  RETRIEVAL_LEXICAL_CANDIDATE_POOL: ${RETRIEVAL_LEXICAL_CANDIDATE_POOL:-24}
  RETRIEVAL_VECTOR_CANDIDATE_POOL: ${RETRIEVAL_VECTOR_CANDIDATE_POOL:-16}
  RETRIEVAL_TERM_THRESHOLD: ${RETRIEVAL_TERM_THRESHOLD:-0.08}
  RETRIEVAL_TEMPLATE_THRESHOLD: ${RETRIEVAL_TEMPLATE_THRESHOLD:-0.06}
  RETRIEVAL_EXAMPLE_THRESHOLD: ${RETRIEVAL_EXAMPLE_THRESHOLD:-0.06}
  QUERY_TIMEOUT_MS: ${QUERY_TIMEOUT_MS:-5000}
  SQL_LOCK_TIMEOUT_MS: ${SQL_LOCK_TIMEOUT_MS:-1000}
  SQL_IDLE_IN_TRANSACTION_TIMEOUT_MS: ${SQL_IDLE_IN_TRANSACTION_TIMEOUT_MS:-10000}
  SQL_EXPLAIN_MAX_COST: ${SQL_EXPLAIN_MAX_COST:-200000}
  QUERY_CACHE_ENABLED: ${QUERY_CACHE_ENABLED:-true}
  QUERY_CACHE_TTL_SECONDS: ${QUERY_CACHE_TTL_SECONDS:-300}
  QUERY_CACHE_MAX_ROWS: ${QUERY_CACHE_MAX_ROWS:-500}
  QUERY_CACHE_NAMESPACE: ${QUERY_CACHE_NAMESPACE:-v1}
  QUERY_OBSERVABILITY_LIMIT: ${QUERY_OBSERVABILITY_LIMIT:-200}
  BENCHMARK_DEFAULT_ITERATIONS: ${BENCHMARK_DEFAULT_ITERATIONS:-7}
  BENCHMARK_P95_TARGET_MS: ${BENCHMARK_P95_TARGET_MS:-1200}
  SCHEDULER_ENABLED: ${SCHEDULER_ENABLED:-true}
  SCHEDULER_POLL_INTERVAL_SECONDS: ${SCHEDULER_POLL_INTERVAL_SECONDS:-15}
  SCHEDULER_BATCH_SIZE: ${SCHEDULER_BATCH_SIZE:-10}
  SCHEDULER_MAX_CONCURRENT_RUNS: ${SCHEDULER_MAX_CONCURRENT_RUNS:-2}
  SCHEDULER_DEFAULT_MAX_RETRIES: ${SCHEDULER_DEFAULT_MAX_RETRIES:-2}
  SCHEDULER_DEFAULT_RETRY_BACKOFF_SECONDS: ${SCHEDULER_DEFAULT_RETRY_BACKOFF_SECONDS:-300}
  REPORT_ARTIFACT_DIR: ${REPORT_ARTIFACT_DIR:-/tmp/tolmach-report-artifacts}
  REPORT_RESULT_SNAPSHOT_LIMIT: ${REPORT_RESULT_SNAPSHOT_LIMIT:-200}
  REPORT_EMAIL_ADAPTER: ${REPORT_EMAIL_ADAPTER:-smtp}
  REPORT_EMAIL_FROM: ${REPORT_EMAIL_FROM:-reports@tolmach.local}
  REPORT_SMTP_HOST: ${REPORT_SMTP_HOST:-}
  REPORT_SMTP_PORT: ${REPORT_SMTP_PORT:-587}
  REPORT_SMTP_USERNAME: ${REPORT_SMTP_USERNAME:-}
  REPORT_SMTP_PASSWORD: ${REPORT_SMTP_PASSWORD:-}
  REPORT_SMTP_USE_TLS: ${REPORT_SMTP_USE_TLS:-true}
  REPORT_SMTP_USE_SSL: ${REPORT_SMTP_USE_SSL:-false}
  REPORT_SLACK_ADAPTER: ${REPORT_SLACK_ADAPTER:-webhook}
  REPORT_SLACK_WEBHOOK_URL: ${REPORT_SLACK_WEBHOOK_URL:-}
  REPORT_DELIVERY_TIMEOUT_SECONDS: ${REPORT_DELIVERY_TIMEOUT_SECONDS:-20}
  DEMO_BOOTSTRAP_ALLOW_NONLOCAL: ${DEMO_BOOTSTRAP_ALLOW_NONLOCAL:-false}
  BOOTSTRAP_CLI_ARGS: ${BOOTSTRAP_CLI_ARGS:---allow-nonlocal}
  OTEL_EXPORTER_OTLP_ENDPOINT: ${BACKEND_OTEL_EXPORTER_OTLP_ENDPOINT:-http://phoenix:4317}

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tolmach}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-tolmach}"]
      interval: 5s
      timeout: 5s
      retries: 20

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    gpus:
      - driver: nvidia
        count: all
        capabilities: [gpu]
    environment:
      OLLAMA_HOST: 0.0.0.0
      OLLAMA_FLASH_ATTENTION: "1"
      OLLAMA_KEEP_ALIVE: 10m
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      LLM_MODEL: ${LLM_MODEL:-qwen3:4b}
    entrypoint:
      - /bin/sh
      - -ec
    command:
      - |
        ollama pull "$$LLM_MODEL"
        ollama list | awk 'NR > 1 {print $$1}' | grep -Fqx "$$LLM_MODEL"

  backend:
    build:
      context: ./backend
    environment:
      <<: *backend-env
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
      phoenix:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    command: >
      sh -c "python -m app.wait_for_db &&
      attempt=0;
      until alembic upgrade head; do
        attempt=$$((attempt + 1));
        if [ $$attempt -ge 5 ]; then
          echo 'alembic upgrade failed after retries';
          exit 1;
        fi;
        echo \"alembic upgrade failed, retry $$attempt/5\";
        sleep 5;
      done &&
      python -m app.bootstrap_cli ${BOOTSTRAP_CLI_ARGS:---allow-nonlocal} &&
      exec uvicorn app.main:app --host 0.0.0.0 --port 8000 --timeout-keep-alive 5"

  scheduler:
    build:
      context: ./backend
    environment:
      <<: *backend-env
    volumes:
      - ./backend:/app
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -m app.worker_health_cli"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s
    command: >
      sh -c "python -m app.wait_for_db &&
      python -m app.scheduler_worker"

  frontend:
    build:
      context: ./frontend
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
      VITE_CSRF_COOKIE_NAME: ${VITE_CSRF_COOKIE_NAME:-tolmach_csrf}
      VITE_CSRF_HEADER_NAME: ${VITE_CSRF_HEADER_NAME:-X-CSRF-Token}
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend:/frontend
    command: >
      sh -c "npm install && npm run dev -- --host 0.0.0.0"

  phoenix:
    image: arizephoenix/phoenix:latest
    ports:
      - "6006:6006"
      - "4317:4317"

volumes:
  postgres-data:
    name: drivee-tolmach-postgres-data
  ollama-data:
    name: drivee-tolmach-ollama-data
