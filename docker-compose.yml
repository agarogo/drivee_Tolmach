services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tolmach}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-tolmach}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: "${DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@${POSTGRES_HOST:-db}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-tolmach}}"
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      LLM_MODEL: ${LLM_MODEL:-qwen3:4b}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.1}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${BACKEND_OTEL_EXPORTER_OTLP_ENDPOINT:-http://phoenix:4317}
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      phoenix:
        condition: service_started
    command: >
      sh -c "python -m app.wait_for_db &&
      attempt=0;
      until alembic upgrade head; do
        attempt=$$((attempt + 1));
        if [ $$attempt -ge 5 ]; then
          echo 'alembic upgrade failed after retries';
          exit 1;
        fi;
        echo \"alembic upgrade failed, retry $$attempt/5\";
        sleep 5;
      done &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  scheduler:
    build:
      context: ./backend
    environment:
      DATABASE_URL: "${DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@${POSTGRES_HOST:-db}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-tolmach}}"
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      LLM_MODEL: ${LLM_MODEL:-qwen3:4b}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.1}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${BACKEND_OTEL_EXPORTER_OTLP_ENDPOINT:-http://phoenix:4317}
    volumes:
      - ./backend:/app
    depends_on:
      backend:
        condition: service_started
    command: >
      sh -c "python -m app.wait_for_db &&
      python -m app.scheduler_worker"

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/frontend
    command: >
      sh -c "npm install && npm run dev -- --host 0.0.0.0"

  phoenix:
    image: arizephoenix/phoenix:latest
    ports:
      - "6006:6006"
      - "4317:4317"

volumes:
  postgres-data:
    name: drivee-tolmach-postgres-data
